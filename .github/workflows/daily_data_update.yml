name: Automate Shipping Financial Data Fetch

on:
  schedule:
    # Runs twice a day: at 07:00 and 19:00 UTC
    - cron: '0 7,19 * * *'
  workflow_dispatch: # Allows you to manually click a button on GitHub to run it anytime

jobs:
  run-fetcher:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/workflows/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance pandas

    - name: Run Data Fetcher Script
      run: python data_fetcher.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add shipping_macro_data.csv
        git commit -m "Automated data pull: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
        git push