name: Automate Shipping Financial Data Fetch

on:
  schedule:
    # Run 1: 08:00 AM UTC (Full update: Brent + BDI + Exchange Rates)
    - cron: '0 8 * * *'
    # Run 2: 08:00 PM UTC (Brent/ZIM update only)
    - cron: '0 20 * * *'
  workflow_dispatch: # Allows you to trigger it manually from GitHub UI anytime

# Grants write permission explicitly inside the file as a backup
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # Fixed the "python-numeric" typo here
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance pandas numpy beautifulsoup4

    - name: Run Full Fetch (08:00 UTC Run)
      if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
      run: python data_fetcher.py

    - name: Run Brent-Only Fetch (20:00 UTC Run)
      if: github.event.schedule == '0 20 * * *'
      run: python data_fetcher.py --brent-only

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add shipping_macro_data.csv
        # Only commit if there are actual changes to prevent workflow errors
        git diff-index --quiet HEAD || git commit -m "Automated data update: $(date -u +'%Y-%m-%d %H:%M') UTC"
        git push