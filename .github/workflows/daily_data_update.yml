name: Automate Shipping Financial Data Fetch

on:
  schedule:
    # Run at 04:00, 12:00, and 20:00 UTC
    - cron: '0 4,12,20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Data Fetch
      # Runs for every scheduled time or manual trigger
      run: python data_fetcher.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add shipping_macro_data.csv
        git diff-index --quiet HEAD || git commit -m "Automated data update: $(date -u +'%Y-%m-%d %H:%M') UTC"
        git push